workflows:
  ios-unsigned-ipa:
    name: Build Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      xcode: "26.0"
      vars:
        # Keep DerivedData OUTSIDE the cloned repo so the SwiftLint build phase
        # (which scans SRCROOT recursively) doesn't lint the SPM dependency
        # checkouts under SourcePackages and blow past warning_threshold.
        DERIVED_DATA: $HOME/diia_derived_data

    scripts:
      - name: Resolve Swift Package dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project DiiaOpenSource.xcodeproj \
            -scheme DiiaOpenSource

      - name: Build (no signing)
        script: |
          set -o pipefail
          xcodebuild build \
            -project DiiaOpenSource.xcodeproj \
            -scheme DiiaOpenSource \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            SKIP_SWIFTLINT=YES \
            2>&1 | tee build_log.txt
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "===== BUILD FAILED — error context ====="
            grep -nE "error:|fatal error|Command .* failed|ld: |BUILD FAILED" build_log.txt | tail -50 || true
            exit "$status"
          fi

      - name: Package IPA (unsigned)
        script: |
          APP_PATH=$(find "$DERIVED_DATA" -name "*.app" -path "*Debug-iphoneos*" | head -1)
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r DiiaOpenSource.ipa Payload

    artifacts:
      - build/DiiaOpenSource.ipa
      - build_log.txt
